mutation UpdateCustomer($input: UpdateCustomerInput!){
    updateCustomer(input: $input){
        ... on Customer{
            title
            firstName
            lastName
            phoneNumber
            emailAddress
        }
    }
}

mutation UpdateProfileEmail($email: String!) {
    updateProfileEmail(email: $email) {
        id
        firstName
        lastName
    }
}

mutation CreateCustomerAddress($input: CreateAddressInput!) {
    createCustomerAddress(input: $input) {
        id
        createdAt
        updatedAt
        fullName
        company
        streetLine1
        streetLine2
        city
        province
        postalCode

        phoneNumber
        defaultShippingAddress
        defaultBillingAddress
        country{
            id
            name
        }
    }
}

mutation UpdateCustomerAddress($input: UpdateAddressInput!){
    updateCustomerAddress(input: $input){
        createdAt
        city
        country {
            name
            code
            id
            languageCode
        }
        id
        company
        defaultBillingAddress
        defaultShippingAddress
        fullName
        phoneNumber
        streetLine1
        streetLine2

    }
}
mutation DeleteCustomerAddress($id: ID!) {
    deleteCustomerAddress(id: $id) {
        success
    }
}
query GetCurrentUser{
    me {
        ... on CurrentUser{
            id
            identifier

            channels {
                ... on CurrentUserChannel{
                    id
                    permissions
                    token
                }
            }
        }
    }
}

query GetActiveCustomer($orderStateFilter: OrderFilterParameter) {
    activeCustomer {
        __typename
        ... on Customer {
            id
            title
            emailAddress
            firstName
            lastName
            phoneNumber


            customFields {
                location
                loyaltyPointsAvailable
            }
            addresses {
                id
                postalCode
                streetLine1
                streetLine2
                fullName
                country {
                    id
                    name
                    code
                    languageCode
                }
                phoneNumber
                company
                city
                streetLine2
                streetLine1
                fullName
                postalCode

                defaultShippingAddress
                defaultBillingAddress
            }
            orders(options: { 
                take: 10, 
                skip: 0,
                filter: $orderStateFilter
            }) {

                totalItems
                items {
                    id
                    currencyCode
                    orderPlacedAt
                    lines {
                        id
                        quantity
                        productVariant {
                            name
                        }
                        featuredAsset {
                            name
                            preview
                        }
                    }
                    active
                    discounts {
                        amount
                    }
                    code
                    state
                    customer {
                        firstName
                        lastName
                    }
                    shippingAddress {
                        country
                        city
                        phoneNumber
                        streetLine1
                        streetLine2
                        postalCode
                        fullName
                    }
                    surcharges {
                        price
                        priceWithTax
                    }
                    couponCodes
                    payments {
                        state
                        createdAt
                        method
                        amount
                        transactionId
                    }
                    totalQuantity
                    totalWithTax
                    billingAddress {
                        postalCode
                        streetLine2
                        fullName
                        city
                        phoneNumber

                        streetLine1
                    }
                    customFields {

                        loyaltyPointsUsed
                        loyaltyPointsEarned
                        otherInstructions
                        

                    }
                }
            }
        }
    }
}

query GetCustomerOrders($skip: Int!, $take: Int!, $orderStateFilter: OrderFilterParameter) {
    activeCustomer {
        __typename
        ... on Customer {
            orders(options: { 
                skip: $skip, 
                take: $take,
                filter: $orderStateFilter
            }) {
                totalItems
                items {
                    id
                    currencyCode
                    orderPlacedAt
                    lines {
                        id
                        quantity
                        productVariant {
                            name
                        }
                        featuredAsset {
                            name
                            preview
                        }
                    }
                    active
                    discounts {
                        amount
                    }
                    code
                    state
                    customer {
                        firstName
                        lastName
                    }
                    shippingAddress {
                        country
                        city
                        phoneNumber
                        streetLine1
                        streetLine2
                        postalCode
                        fullName
                    }
                    surcharges {
                        price
                        priceWithTax
                    }
                    couponCodes
                    payments {
                        state
                        createdAt
                        method
                        amount
                        transactionId
                    }
                    totalQuantity
                    totalWithTax
                    billingAddress {
                        postalCode
                        streetLine2
                        fullName
                        city
                        phoneNumber
                        streetLine1
                    }
                    customFields {
                        loyaltyPointsUsed
                        loyaltyPointsEarned
                        otherInstructions
                    }
                }
            }
        }
    }
}

query GetChannelsByPostalCode($postalCode: String!) {
    getChannelsByPostalCode(postalCode: $postalCode) {
        id
        code
        token
        name
        type
    }
}

query GetChannelsByCustomerPhoneNumber($phoneNumber: String!) {
    getChannelsByCustomerPhoneNumber(phoneNumber: $phoneNumber) {
        id
        code
        token
        name
        type
    }
}

query GetAvailableChannels($postalCode: String!) {
    getAvailableChannels(postalCode: $postalCode) {
        id
        code
        token
        name
        isAvailable
        message
        type
    }
}

query PostalCodes {
    postalCodes {
        id
        code
        isAnywhere
    }
}

mutation RequestAccountDeletion($reason: String) {
    requestAccountDeletion(reason: $reason) {
        success
        message
    }
}
