mutation Authenticate($phoneNumber: String!, $code: String!, $firstName: String, $lastName: String) {
    authenticate(input: {
        phoneOtp: {
            phoneNumber: $phoneNumber
            code: $code
            firstName: $firstName
            lastName: $lastName
        }
    }) {
        __typename
        ... on CurrentUser {
            id
            identifier
        }
        ... on InvalidCredentialsError {
            message
        }
    }
}

mutation SendPhoneOtp($phoneNumber: String!) {
    sendPhoneOtp(phoneNumber: $phoneNumber)
}
mutation ResendPhoneOtp($phoneNumber: String!) {
    resendPhoneOtp(phoneNumber: $phoneNumber)
}
query GetChannelsByCustomerEmail($email: String!) {
    getChannelsByCustomerEmail(email: $email) {
        id
        code
        token
        defaultCurrencyCode
    }
}

query GetChannelsByPhoneNumber($phoneNumber: String!) {
    getChannelsByCustomerPhoneNumber(phoneNumber: $phoneNumber) {
        id
        code
        token
        defaultCurrencyCode
    }
}
mutation LogoutUser{
    logout {
        success
    }
}

query GetChannelList{
    getChannelList {
        id
        code
        token
    }
}

