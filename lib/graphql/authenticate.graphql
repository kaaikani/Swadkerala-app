mutation Authenticate($phoneNumber: String!, $code: String!, $firstName: String, $lastName: String) {
    authenticate(input: {
        phoneOtp: {
            phoneNumber: $phoneNumber
            code: $code
            firstName: $firstName
            lastName: $lastName
        }
    }) {
        __typename
        ... on CurrentUser {
            id
            identifier
        }
        ... on InvalidCredentialsError {
            message
        }
    }
}

mutation LoginWithPhoneOtp($phoneNumber: String!, $code: String!) {
    authenticate(input: {
        phoneOtp: {
            phoneNumber: $phoneNumber
            code: $code
        }
    }) {
        __typename
        ... on CurrentUser {
            id
            identifier
        }
        ... on InvalidCredentialsError {
            message
        }
        ... on NotVerifiedError {
            message
        }
    }
}

mutation LoginWithGoogle($token: String!) {
    authenticate(input: {
        google: {
            token: $token
        }
    }) {
        __typename
        ... on CurrentUser {
            id
            identifier
        }
        ... on InvalidCredentialsError {
            message
        }
        ... on NotVerifiedError {
            message
        }
    }
}

mutation SendPhoneOtp($phoneNumber: String!) {
    sendPhoneOtp(phoneNumber: $phoneNumber)

}
mutation ResendPhoneOtp($phoneNumber: String!) {
    resendPhoneOtp(phoneNumber: $phoneNumber)
}

mutation LogoutUser{
    logout {
        success
    }
}

query GetChannelList{
    getChannelList {
        id
        code
        token
    }
}

