query Collections($options: CollectionListOptions) {
    collections(options: $options) {
        items {
            id
            name

children {
    id
    slug
    name

}

            productVariants{
                totalItems
            }
            slug
            parent {
                name
            }
            featuredAsset {
                id
                preview
            }
        }
    }
}

query Products ($slug: String, $id: ID){
    collection(slug: $slug, id: $id) {
        id
        name



        productVariants{

            items{
                product{
                    id
                    name
                    enabled
                    featuredAsset {
                        ...Asset
                    }
                }
                priceWithTax
                stockLevel
                productId

                name
            }
        }

    }
}



fragment Asset on Asset {
    id
    width
    height
    name
    preview
    focalPoint {
        x
        y
        __typename
    }
    __typename
}