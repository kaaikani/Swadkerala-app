query MyReferrals($take: Int, $skip: Int, $status: ReferralStatus) {
  myReferrals(take: $take, skip: $skip, status: $status) {
    totalItems
    items {
      id
      referralNumber
      createdAt
      referredCustomer {
        id
        firstName
        lastName
        emailAddress
      }
      order {
        id
        code
        state
      }
      status
      points
      isScratched
      note
    }
  }
}

