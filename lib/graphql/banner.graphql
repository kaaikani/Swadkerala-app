query customBanners {
    customBanners{
        id
        assets {
            id
            name
            source
        }
        channels {
            id
            code
        }
    }
}




# lib/graphql/search.graphql
query Search($input: SearchInput!) {
    search(input: $input) {
        items {
            productVariantId
            productId
            slug
            productName
            productVariantName
            description
            collectionIds
            priceWithTax {
                ... on PriceRange {
                    min
                    max
                }
            }
            productAsset {
                id
                preview
                focalPoint { x y }
            }
        }
        totalItems
    }
}




mutation ToggleFavorite($productId: ID!) {
    toggleFavorite(productId: $productId) {
        items {
            id
            product {
                id
                name
            }
        }
        totalItems
    }
}


query GetCustomerFavorites {
    activeCustomer {

        __typename
        ... on Customer {

            favorites {
                items {

                    id
                    product {
                        id
                        featuredAsset{
                            name
                            preview
                            __typename
                        }


                        enabled
                        variants{
                            id
                        }


                        name

                    }

                }
                totalItems
            }
        }
    }
}



query GetFrequentlyOrderedProducts {
    frequentlyOrderedProducts {
        product {
            enabled
            id
            name
            slug
            variants {
                id
                name
                price
                priceWithTax
                currencyCode
            }
            featuredAsset {
                preview
            }
        }
        orderCount
    }
}