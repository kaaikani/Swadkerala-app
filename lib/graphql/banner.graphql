query customBanners {
    customBanners{
        id
        assets {
            id
            name
            source
        }
        channels {
            id
            code
        }
    }
}




# lib/graphql/search.graphql
query Search($input: SearchInput!) {
    search(input: $input) {
        items {
            productVariantId
            productId
            slug
            productName
            productVariantName
            description
            collectionIds
            priceWithTax {
                ... on PriceRange {
                    min
                    max
                }
            }
            productAsset {
                id
                preview
                focalPoint { x y }
            }
        }
        totalItems
    }
}




mutation ToggleFavorite($productId: ID!) {
    toggleFavorite(productId: $productId) {
        items {
            id
            product {
                id
                name
            }
        }
        totalItems
    }
}


query GetCustomerFavorites {
    activeCustomer {

        __typename
        ... on Customer {

            favorites {
                items {

                    id
                    product {
                        id
                        featuredAsset{
                            name
                            preview
                            __typename
                        }


                        enabled
                        variants{
                            id
                            name
                            price
                            priceWithTax
                            currencyCode
                            options {
                                id
                                name
                                group {
                                    id
                                    name
                                }
                            }
                        }


                        name

                    }

                }
                totalItems
            }
        }
    }
}



query GetFrequentlyOrderedProducts {
    frequentlyOrderedProducts {
        product {
            enabled
            id
            name
            slug
            variants {
                id
                name
                price
                priceWithTax
                currencyCode
                options {
                    id
                    name
                    group {
                        id
                        name
                    }
                }
            }
            featuredAsset {
                preview
            }
        }
        orderCount
    }
}

query LoyaltyPointsConfig {
    loyaltyPointsConfig {
        id
        createdAt
        updatedAt
        rupeesPerPoint
        pointsPerRupee
    }
}



mutation ApplyLoyaltyPoints($amount: Int!) {
    applyLoyaltyPointsToActiveOrder(amount: $amount) {
        id
        createdAt
        customFields {
            loyaltyPointsUsed
            loyaltyPointsEarned
        }
        discounts {
            amountWithTax
        }
    }
}





mutation RemoveLoyaltyPointsFromActiveOrder {
    removeLoyaltyPointsFromActiveOrder {
        id
    }
}





query GetCouponCodeList{
    getCouponCodeList{

        items {
            id
            name

            couponCode
            description
            enabled
            endsAt
            startsAt
            createdAt
            updatedAt

            perCustomerUsageLimit
            actions {
                code
                args {

                    name
                    value
                }
            }

            conditions{
                code
                args{
                    name
                    value
                }
            }
            usageLimit
        }
        totalItems
        __typename
    }
}


mutation ApplyCouponCode($input: String!) {
    applyCouponCode(couponCode: $input) {
        __typename
        ... on Order {
            id
            code
            state
            active
            couponCodes
            customFields {
                otherInstructions
            }
            lines {
                id
                unitPrice
                unitPriceWithTax
                quantity
                linePriceWithTax
                discountedLinePriceWithTax
                productVariant {
                    id
                    name
                    price
                    __typename
                }
                discounts {
                    amount
                    amountWithTax
                    description
                    adjustmentSource
                    type
                    __typename
                }
                __typename
            }
            totalQuantity
            subTotal
            subTotalWithTax
            total
            totalWithTax
            shipping
            shippingWithTax
            shippingLines {
                priceWithTax
                shippingMethod {
                    id
                    code
                    name
                    __typename
                }
                __typename
            }
            discounts {
                amount
                amountWithTax
                description
                adjustmentSource
                type
                __typename
            }
            promotions {
                couponCode
                name
                enabled
                actions {
                    args {
                        value
                        name
                    }
                    code
                }
                __typename
            }
        }
        ... on CouponCodeInvalidError {
            message
        }
        ... on CouponCodeExpiredError {
            message
        }
        ... on CouponCodeLimitError {
            message
        }
    }
}

mutation RemoveCouponCode($couponCode: String!){
    removeCouponCode(couponCode: $couponCode){
        ...Cart
        __typename
    }
}

mutation RequestOrderCancellation($orderId: ID!, $reason: String!) {
    requestOrderCancellation(orderId: $orderId, reason: $reason) {
        id
        code
        state
        __typename
    }
}

