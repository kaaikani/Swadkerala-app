query customBanners {
    customBanners{
        id
        assets {
            id
            name
            source
        }
        channels {
            id
            code
        }
    }
}




# lib/graphql/search.graphql
query Search($input: SearchInput!) {
    search(input: $input) {
        items {
            productVariantId
            productId
            slug
            productName
            productVariantName
            description
            collectionIds
            priceWithTax {
                ... on PriceRange {
                    min
                    max
                }
            }
            productAsset {
                id
                preview
                focalPoint { x y }
            }
        }
        totalItems
    }
}




mutation ToggleFavorite($productId: ID!) {
    toggleFavorite(productId: $productId) {
        items {
            id
            product {
                id
                name
            }
        }
        totalItems
    }
}


query GetCustomerFavorites {
    activeCustomer {

        __typename
        ... on Customer {

            favorites {
                items {

                    id
                    product {
                        id
                        featuredAsset{
                            name
                            preview
                            __typename
                        }


                        enabled
                        variants{
                            id
                            name
                            price
                            priceWithTax
                            currencyCode
                        }


                        name

                    }

                }
                totalItems
            }
        }
    }
}



query GetFrequentlyOrderedProducts {
    frequentlyOrderedProducts {
        product {
            enabled
            id
            name
            slug
            variants {
                id
                name
                price
                priceWithTax
                currencyCode

            }
            featuredAsset {
                preview
            }
        }
        orderCount
    }
}

query LoyaltyPointsConfig {
    loyaltyPointsConfig {
        id
        createdAt
        updatedAt
        rupeesPerPoint
        pointsPerRupee
    }
}



mutation ApplyLoyaltyPoints($amount: Int!) {
    applyLoyaltyPointsToActiveOrder(amount: $amount) {
        id
        createdAt
        customFields {
            loyaltyPointsUsed
            loyaltyPointsEarned
        }
        discounts {
            amountWithTax
        }
    }
}





mutation RemoveLoyaltyPointsFromActiveOrder {
    removeLoyaltyPointsFromActiveOrder {
        id
    }
}





query GetCouponCodeList{
    getCouponCodeList{

        items {
            id
            name

            couponCode
            description
            enabled
            endsAt
            startsAt
            createdAt
            updatedAt

            perCustomerUsageLimit
            actions {
                code
                args {

                    name
                    value
                }
            }

            conditions{
                code
                args{
                    name
                    value
                }
            }
            usageLimit
        }
        totalItems
        __typename
    }
}


mutation ApplyCouponCode($input: String!) {
    applyCouponCode(couponCode: $input) {
        __typename
        ... on Order {
            id
            couponCodes
            customFields {
                otherInstructions
            }
            total
        }
        ... on CouponCodeInvalidError {
            message
        }
    }
}

mutation RemoveCouponCode($couponCode: String!){
    removeCouponCode(couponCode: $couponCode){
        ...Cart
        __typename
    }
}


