query ActiveOrder {
    activeOrder {

        currencyCode
        ...Cart
        ... on Order {
            id
            shippingWithTax
            couponCodes
            state
            shippingAddress {
                ...OrderAddress
                __typename
            }

            customFields {
                loyaltyPointsEarned
                loyaltyPointsUsed
                otherInstructions
            }
            quantityLimitStatus {
                isValid
                hasViolations
                totalViolations
                violations {
                    orderLineId
                    productName
                    variantName
                    currentQuantity
                    maxQuantity
                    reason
                }
            }
            total
        }
        __typename
    }
}

mutation RemoveOrderLine($orderLineId: ID!){
    removeOrderLine(orderLineId: $orderLineId){
        ...Cart
        __typename
        ...on ErrorResult{
            errorCode
            message
        }
    }
}

mutation RemoveAllOrderLines{
    removeAllOrderLines {
        __typename
        ...Cart
        ...on ErrorResult{
            errorCode

        }
    }
}
mutation AdjustOrderLine($orderLineId: ID!, $quantity: Int!){
    adjustOrderLine(orderLineId: $orderLineId, quantity: $quantity){
        __typename
        ...Cart
        ...ErrorResult
        ... on OrderInterceptorError {
            interceptorError
            errorCode
            message
            __typename
        }
    }
}


mutation SetShippingAddress($input: CreateAddressInput!) {
    setOrderShippingAddress(input: $input) {
        ...Cart
        ... on Order {
            shippingAddress {
                ...OrderAddress

                __typename
            }
            __typename
        }
        ...ErrorResult
        __typename
    }
}

mutation SetOtherInstruction($orderId: ID!,$value: String!){
    otherInstructions(value: $value,orderId: $orderId){
        customFields {
            otherInstructions
        }
    }
}
mutation SetShippingMethod($id: [ID!]!) {
    setOrderShippingMethod(shippingMethodId: $id) {

        ...Cart
        ...ErrorResult
        __typename
    }
}
query GetEligiblePaymentMethods {
    eligiblePaymentMethods {
        id
        name
        code
        eligibilityMessage
        isEligible
        __typename
    }
}
query GetEligibleShippingMethodsEnabled {
    eligibleShippingMethodsEnabled {
        id
        name
        code
        calculator {
            code
            
            args {
                name
                value
            }
        }
        __typename
    }
}

query GetOrderByCode($code: String!) {
    orderByCode(code: $code) {
        ...Cart
        updatedAt
        orderPlacedAt
        currencyCode
        shippingAddress {
            fullName
            company
            streetLine1
            streetLine2
            city
            province
            postalCode
            phoneNumber
            country
        }
        billingAddress {
            fullName
            company
            streetLine1
            streetLine2
            city
            province
            postalCode
            phoneNumber
            country
        }
        payments {
            state
            createdAt
            method
            amount
            transactionId
        }
        customFields {
            loyaltyPointsEarned
            loyaltyPointsUsed
        }
        customer {
            id
            emailAddress
            firstName
            lastName
            user {
                id
                identifier
                verified
                __typename
            }
            __typename
        }
        __typename
    }
}

mutation AddPayment($input: PaymentInput!) {
    addPaymentToOrder(input: $input) {
        ...Cart
        ...ErrorResult
        __typename
    }
}

query NextOrderStates{
    nextOrderStates
}

mutation ClaimGuestOrder($guestOrderCode: String!) {
    claimGuestOrder(guestOrderCode: $guestOrderCode) {
        ...Cart
        __typename
    }
}

mutation TransitionOrderToState($state: String!){
    transitionOrderToState(state: $state){
        ...Cart

        ...ErrorResult
        __typename
    }
}

mutation TransitionToArrangingPayment {
    transitionOrderToState(state: "ArrangingPayment") {
        ...Cart
        ...ErrorResult
        __typename
    }
}

mutation GenerateRazorpayOrderId($orderId: ID!) {
    generateRazorpayOrderId(orderId: $orderId) {
        amount
        currency
        errorMessage
        keyId
        razorpayOrderId
        success
    }
}


fragment OrderAddress on OrderAddress {
    fullName
    company
    streetLine1
    streetLine2
    city
    province
    postalCode
    country
    countryCode
    phoneNumber
    __typename
}

fragment ErrorResult on ErrorResult {
    errorCode
    message
    __typename
}


fragment Cart on Order {
    id
    code
    state
    active
    validationStatus {
        isValid
        hasUnavailableItems
        totalUnavailableItems
        unavailableItems {
            orderLineId
            productName
            variantName
            reason
        }
    }
    couponCodes
    promotions {
        couponCode
        name
        enabled
        actions {
            args {
                value
                name
            }
            code
        }
        conditions {
            code
            args {
                name
                value
            }
        }
    }
    lines {
        id
        quantity
        isAvailable
        unavailableReason

        featuredAsset {
            ...Asset
            __typename
        }
        unitPrice
        unitPriceWithTax
        quantity
        linePriceWithTax
        discountedLinePriceWithTax
        productVariant {
            id
            name
            stockLevel
            price
            product {
                enabled
                __typename
            }
            __typename
        }
        discounts {
            amount
            amountWithTax
            description
            adjustmentSource
            type
            __typename
        }
        __typename
    }
    totalQuantity
    subTotal
    subTotalWithTax
    total
    totalWithTax
    shipping
    shippingWithTax
    shippingLines {
        priceWithTax
        shippingMethod {
            id
            code
            name
            description
            __typename
        }
        __typename
    }
    discounts {
        amount
        amountWithTax
        description
        adjustmentSource
        type
        __typename
    }
    customFields {
        loyaltyPointsEarned
        loyaltyPointsUsed
        otherInstructions
    }
    quantityLimitStatus {
        isValid
        hasViolations
        totalViolations
        violations {
            orderLineId
            productName
            variantName
            currentQuantity
            maxQuantity
            reason
        }
    }

    __typename
}

fragment Asset on Asset {
    id
    width
    height
    name
    preview
    focalPoint {
        x
        y
        __typename
    }
    __typename
}

