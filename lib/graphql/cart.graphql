query GetCartTotals {
    activeOrder {
        ...Cart
        __typename
    }
}

query UpdatedPrice {
    activeOrder {
        id
        lines {
            id
            productVariant {
                id
                price
            }
            unitPrice
            quantity
        }
    }
}

mutation AddToCart($variantId: ID!, $qty: Int!) {
    addItemToOrder(productVariantId: $variantId, quantity: $qty) {
        ...Cart
        ...ErrorResult
        ... on InsufficientStockError {
            order {
                ...Cart
                __typename
            }
            __typename
        }
        __typename
    }
}

fragment Cart on Order {
    id
    code
    state
    active
    validationStatus {
        isValid
        hasUnavailableItems
        totalUnavailableItems
        unavailableItems {
            orderLineId
            productName
            variantName
            reason
        }
    }
    couponCodes
    promotions {
        couponCode
        name
        enabled
        actions {
            args {
                value
                name
            }
            code
        }
        conditions {
            code
            args {
                name
                value
            }
        }
    }
    lines {
        id
        unitPrice
        isAvailable
        unavailableReason
        featuredAsset {
            ...Asset
            __typename
        }
        unitPriceWithTax
        quantity
        linePriceWithTax
        discountedLinePriceWithTax
        productVariant {
            id
            name
            stockLevel
            price
            product {
                enabled
                __typename
            }
            __typename
        }
        discounts {
            amount
            amountWithTax
            description
            adjustmentSource
            type
            __typename
        }
        customFields
        __typename
    }
    totalQuantity
    subTotal
    subTotalWithTax
    total
    totalWithTax
    shipping
    shippingWithTax
    shippingLines {
        priceWithTax
        shippingMethod {
            id
            code
            name
            description
            __typename
        }
        __typename
    }
    discounts {
        amount
        amountWithTax
        description
        adjustmentSource
        type
        __typename
    }
    customFields {
        clientRequestToCancel
    }
    __typename
}

fragment Asset on Asset {
    id
    width
    height
    name
    preview
    focalPoint {
        x
        y
        __typename
    }
    __typename
}

fragment ErrorResult on ErrorResult {
    errorCode
    message
    __typename
}