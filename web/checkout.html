<!DOCTYPE html>
<html>
<head>
    <title>Redirecting to Checkout...</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin: 0;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn {
            background: #FF6B6B;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            background: #FF5252;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>💳 Opening Checkout...</h2>
        <div class="spinner"></div>
        <p>Redirecting to your app...</p>
        
        <div style="margin-top: 30px;">
            <p>If redirect doesn't work, try:</p>
            <a href="testapp://checkout" class="btn">Open in App</a>
            <br><br>
            <a href="kaaikani://checkout" class="btn">Alternative Link</a>
        </div>
    </div>

    <script>
        function redirectToApp() {
            window.location.href = 'testapp://checkout';
            
            setTimeout(function() {
                window.location.href = 'kaaikani://checkout';
            }, 1000);
            
            setTimeout(function() {
                document.querySelector('.spinner').style.display = 'none';
                document.querySelector('p').innerHTML = 'Please click a button below:';
            }, 3000);
        }

        window.onload = function() {
            setTimeout(redirectToApp, 1000);
        };
    </script>
</body>
</html>
