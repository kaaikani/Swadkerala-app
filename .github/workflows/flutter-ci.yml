name: Flutter Build CI

on:
  push:
    branches: ["master", "IOSlive"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.5"

      - name: Install dependencies
        run: flutter pub get

      - name: Fix plugin namespaces (AGP compatibility)
        run: bash fix_plugin_namespaces.sh

      - name: Get app version from pubspec.yaml
        id: version
        run: |
          VERSION_LINE=$(grep '^version:' pubspec.yaml | head -1)
          BUILD_NAME=$(echo "$VERSION_LINE" | sed -E 's/version:[[:space:]]*([^+]+)\+.*/\1/' | tr -d ' ')
          BUILD_NUMBER=$(echo "$VERSION_LINE" | sed -E 's/version:.*\+([0-9]+).*/\1/')
          if [ -z "$BUILD_NAME" ]; then BUILD_NAME="1.0.0"; fi
          if [ -z "$BUILD_NUMBER" ]; then BUILD_NUMBER="1"; fi
          echo "build_name=$BUILD_NAME" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Using version: $BUILD_NAME+$BUILD_NUMBER"

      - name: Build APK (universal)
        run: flutter build apk --release --build-name=${{ steps.version.outputs.build_name }} --build-number=${{ steps.version.outputs.build_number }}

      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi --build-name=${{ steps.version.outputs.build_name }} --build-number=${{ steps.version.outputs.build_number }}

      - name: Build AAB
        run: flutter build appbundle --release --build-name=${{ steps.version.outputs.build_name }} --build-number=${{ steps.version.outputs.build_number }}

      # - name: Upload APK & AAB artifacts
      #   uses: actions/upload-artifact@v4
