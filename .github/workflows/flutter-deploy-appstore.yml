# Required GitHub Secrets:
#   APPLE_CERTIFICATE_BASE64       - base64 of your .p12 distribution certificate
#   APPLE_CERTIFICATE_PASSWORD     - Password for the .p12 certificate
#   APPSTORE_CONNECT_API_KEY_ID    - App Store Connect API Key ID
#   APPSTORE_CONNECT_API_ISSUER_ID - App Store Connect Issuer ID
#   APPSTORE_CONNECT_API_KEY_BASE64 - base64 of your .p8 API key file
#
# Version is read from pubspec.yaml. Build number auto-increments on each run.

name: Deploy to App Store (TestFlight)

on:
  workflow_dispatch:

env:
  BUNDLE_ID: com.kaaikani.kaaikani
  TEAM_ID: F987349LN6

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.5"
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      # Auto-increment build number in pubspec.yaml
      - name: Auto-increment version
        id: version
        run: |
          VERSION_LINE=$(grep '^version:' pubspec.yaml | head -1)
          BUILD_NAME=$(echo "$VERSION_LINE" | sed -E 's/version:[[:space:]]*([^+]+)\+.*/\1/' | tr -d ' ')
          BUILD_NUMBER=$(echo "$VERSION_LINE" | sed -E 's/version:.*\+([0-9]+).*/\1/')

          if [ -z "$BUILD_NAME" ]; then BUILD_NAME="1.0.0"; fi
          if [ -z "$BUILD_NUMBER" ]; then BUILD_NUMBER="1"; fi

          NEW_BUILD_NUMBER=$((BUILD_NUMBER + 1))
          sed -i '' "s/^version: ${BUILD_NAME}+${BUILD_NUMBER}/version: ${BUILD_NAME}+${NEW_BUILD_NUMBER}/" pubspec.yaml

          echo "build_name=$BUILD_NAME" >> $GITHUB_OUTPUT
          echo "build_number=$NEW_BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Building version: $BUILD_NAME+$NEW_BUILD_NUMBER (was +$BUILD_NUMBER)"

      # Commit the bumped version back
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "ci: bump build number to ${{ steps.version.outputs.build_name }}+${{ steps.version.outputs.build_number }} [skip ci]" || echo "No changes to commit"
          git push

      # Install Apple certificate in keychain
      - name: Install Apple certificate
        id: signing
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          echo "keychain_path=$KEYCHAIN_PATH" >> $GITHUB_OUTPUT
          echo "Certificate installed"

      # Setup App Store Connect API key for automatic signing
      - name: Setup App Store Connect API key
        run: |
          mkdir -p ~/.private_keys
          echo "${{ secrets.APPSTORE_CONNECT_API_KEY_BASE64 }}" | base64 --decode > ~/.private_keys/AuthKey_${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}.p8
          mkdir -p ~/private_keys
          cp ~/.private_keys/AuthKey_${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}.p8 ~/private_keys/

      # Install CocoaPods
      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update
          cd ..

      # Fix firebase_messaging non-modular header error (Xcode 16+ with static frameworks)
      - name: Patch Firebase messaging headers
        run: |
          # Find and patch FLTFirebaseMessagingPlugin.h in pub-cache
          find "$HOME/.pub-cache" -path "*/firebase_messaging*/ios/Classes/FLTFirebaseMessagingPlugin.h" 2>/dev/null | while read header; do
            if ! grep -q '#import <FirebaseMessaging/FirebaseMessaging.h>' "$header"; then
              sed -i '' 's|#import <firebase_core/FLTFirebasePlugin.h>|#import <firebase_core/FLTFirebasePlugin.h>\n#import <FirebaseMessaging/FirebaseMessaging.h>|' "$header"
              echo "Patched: $header"
            fi
          done
          # Also patch in .symlinks if present
          SYMLINK_HEADER="ios/.symlinks/plugins/firebase_messaging/ios/Classes/FLTFirebaseMessagingPlugin.h"
          if [ -f "$SYMLINK_HEADER" ] && ! grep -q '#import <FirebaseMessaging/FirebaseMessaging.h>' "$SYMLINK_HEADER"; then
            sed -i '' 's|#import <firebase_core/FLTFirebasePlugin.h>|#import <firebase_core/FLTFirebasePlugin.h>\n#import <FirebaseMessaging/FirebaseMessaging.h>|' "$SYMLINK_HEADER"
            echo "Patched: $SYMLINK_HEADER"
          fi
          echo "Firebase messaging header patch complete"

      # Create ExportOptions.plist with automatic signing
      - name: Create ExportOptions.plist
        run: |
          cat > ios/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>F987349LN6</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          echo "Created ExportOptions.plist with automatic signing"

      # Build Flutter iOS without codesign first, then archive + export with API key auth
      - name: Build iOS IPA
        run: |
          # Step 1: Flutter build without codesign
          flutter build ios --release --no-codesign \
            --build-name=${{ steps.version.outputs.build_name }} \
            --build-number=${{ steps.version.outputs.build_number }}

          API_KEY_PATH="$HOME/.private_keys/AuthKey_${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}.p8"

          # Step 2: xcodebuild archive with API key authentication
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/Runner.xcarchive \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APPSTORE_CONNECT_API_ISSUER_ID }}" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=${{ env.TEAM_ID }} \
            CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES=YES \
            DEBUG_INFORMATION_FORMAT=dwarf-with-dsym \
            -quiet

          # Step 3: Export IPA
          xcodebuild -exportArchive \
            -archivePath build/ios/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APPSTORE_CONNECT_API_ISSUER_ID }}"

          echo "IPA built successfully"

      # Upload to TestFlight
      - name: Upload to TestFlight
        run: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" -type f | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No IPA file found in build/ios/ipa/"
            exit 1
          fi
          echo "Uploading: $IPA_PATH (v${{ steps.version.outputs.build_name }}+${{ steps.version.outputs.build_number }})"

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPSTORE_CONNECT_API_ISSUER_ID }}"

          echo "Uploaded to TestFlight: v${{ steps.version.outputs.build_name }}+${{ steps.version.outputs.build_number }}"

      # Upload IPA as artifact
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaaikani-ios-${{ steps.version.outputs.build_name }}-${{ steps.version.outputs.build_number }}
          path: build/ios/ipa/*.ipa
          retention-days: 30

      # Cleanup
      - name: Cleanup signing
        if: always()
        run: |
          if [ -f "${{ steps.signing.outputs.keychain_path }}" ]; then
            security delete-keychain "${{ steps.signing.outputs.keychain_path }}" 2>/dev/null || true
          fi
