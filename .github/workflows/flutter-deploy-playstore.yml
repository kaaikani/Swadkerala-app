name: Deploy to Google Play Store

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      track:
        description: 'Release track (internal, closed, open, production)'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - closed
          - open
          - production

env:
  APPLICATION_ID: com.kaaikani.kaaikani

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.5"
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test || true

      - name: Build App Bundle
        run: flutter build appbundle --release
        env:
          FLUTTER_BUILD_MODE: release

      - name: Build APK (for internal testing)
        run: flutter build apk --release
        env:
          FLUTTER_BUILD_MODE: release

      - name: Upload to Internal Testing
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop') || (github.event.inputs.track == 'internal')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.APPLICATION_ID }}
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          inAppUpdatePriority: 2

      - name: Upload to Closed Testing
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.track == 'closed'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.APPLICATION_ID }}
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: closed
          status: completed
          inAppUpdatePriority: 3

      - name: Upload to Open Testing
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.track == 'open'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.APPLICATION_ID }}
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: open
          status: completed
          inAppUpdatePriority: 4

      - name: Upload to Production
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.track == 'production')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.APPLICATION_ID }}
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: production
          status: completed
          inAppUpdatePriority: 5

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30


