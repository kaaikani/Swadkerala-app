# Required GitHub Secrets:
#   GOOGLE_PLAY_SERVICE_ACCOUNT_JSON - Full JSON content of your Play Console service account key (e.g. kaaikani-420702-6cb05f6d0f33.json)
#   ANDROID_KEYSTORE_BASE64         - base64 of upload keystore: base64 -w0 /path/to/upload-keystore.jks
#   ANDROID_KEYSTORE_PASSWORD      - Keystore store password
#   ANDROID_KEY_ALIAS              - Key alias (e.g. upload)
#   ANDROID_KEY_PASSWORD           - Key alias password

name: Deploy to Google Play (Internal Testing Only)

on:
  push:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

env:
  APPLICATION_ID: com.kaaikani.kaaikani

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.5"
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Fix plugin namespaces (AGP compatibility)
        run: bash fix_plugin_namespaces.sh

      - name: Run tests
        run: flutter test || true

      # Decode keystore from secret (required for Play Store signing)
      # Secret must be a single line: base64 -w0 /path/to/keystore.jks (no trailing text/newlines)
      - name: Decode Keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_B64" | tr -d '\n\r[:space:]' | base64 --decode > android/app/upload-keystore.jks
          if [ ! -s android/app/upload-keystore.jks ]; then
            echo "::error::Decoded keystore is empty. Fix ANDROID_KEYSTORE_BASE64: use base64 -w0 /path/to/keystore and paste only the single line (no shell prompt)."
            exit 1
          fi

      # Create key.properties so Gradle signs the AAB with your upload key
      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Set build number (versionCode)
        run: echo "Building versionCode = ${{ github.run_number }}"

      # Remove plugins that fail Android Kotlin compile (v1 embedding / Registrar issues).
      # Flutter plugin loader reads .flutter-plugins-dependencies (JSON); also patch .flutter-plugins.
      - name: Exclude problematic plugins from Android build
        run: |
          sed -i '/^fluttertoast=/d' .flutter-plugins 2>/dev/null || true
          sed -i '/^speech_to_text=/d' .flutter-plugins 2>/dev/null || true
          if [ -f .flutter-plugins-dependencies ]; then
            jq '
              .plugins.android |= map(select(.name != "fluttertoast" and .name != "speech_to_text")) |
              .plugins.ios |= map(select(.name != "fluttertoast" and .name != "speech_to_text")) |
              .plugins.web |= map(select(.name != "fluttertoast" and .name != "speech_to_text")) |
              .plugins.macos |= map(select(.name != "fluttertoast" and .name != "speech_to_text")) |
              .plugins.linux |= map(select(.name != "fluttertoast" and .name != "speech_to_text")) |
              .plugins.windows |= map(select(.name != "fluttertoast" and .name != "speech_to_text")) |
              .dependencyGraph |= map(select(.name != "fluttertoast" and .name != "speech_to_text")) |
              .dependencyGraph |= map(if .dependencies then .dependencies |= map(select(. != "fluttertoast" and . != "speech_to_text")) else . end)
            ' .flutter-plugins-dependencies > .flutter-plugins-dependencies.tmp && mv .flutter-plugins-dependencies.tmp .flutter-plugins-dependencies
            echo "Removed fluttertoast and speech_to_text from .flutter-plugins-dependencies"
          fi
          echo "Excluded fluttertoast and speech_to_text from plugin lists"

      # GeneratedPluginRegistrant.java is generated by flutter pub get and still references excluded plugins.
      # Remove the try-catch blocks for flutter_native_splash, fluttertoast, speech_to_text (process bottom-to-top).
      - name: Patch GeneratedPluginRegistrant.java
        run: |
          REGISTRANT="android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java"
          for plugin in SpeechToTextPlugin FlutterToastPlugin FlutterNativeSplashPlugin; do
            line=$(grep -n "$plugin" "$REGISTRANT" 2>/dev/null | head -1 | cut -d: -f1)
            while [ -n "$line" ]; do
              start=$((line - 2))
              end=$((line + 2))
              sed -i "${start},${end}d" "$REGISTRANT"
              line=$(grep -n "$plugin" "$REGISTRANT" 2>/dev/null | head -1 | cut -d: -f1)
            done
          done
          echo "Removed excluded plugin registrations from GeneratedPluginRegistrant.java"

      # versionCode = github.run_number. --no-pub prevents pub get from regenerating plugin files
      - name: Build App Bundle
        run: flutter build appbundle --release --no-pub --build-number=${{ github.run_number }}
        env:
          FLUTTER_BUILD_MODE: release

      - name: Build APK (for internal testing)
        run: flutter build apk --release --no-pub --build-number=${{ github.run_number }}
        env:
          FLUTTER_BUILD_MODE: release

      - name: Upload to Internal Testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.APPLICATION_ID }}
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          inAppUpdatePriority: 2

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
