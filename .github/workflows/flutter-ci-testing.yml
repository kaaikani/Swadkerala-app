name: Flutter CI - Testing & Build

on:
  push:
    branches:
      - main
      - master
      - develop
      - IOSlive
      - 'feature/**'
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.5"
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Check formatting
        run: dart format --set-exit-if-changed .

  build:
    runs-on: ubuntu-latest
    needs: test
    
    strategy:
      matrix:
        build-type: [apk, appbundle]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.5"
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Get app version from pubspec.yaml
        id: version
        run: |
          VERSION_LINE=$(grep '^version:' pubspec.yaml | head -1)
          BUILD_NAME=$(echo "$VERSION_LINE" | sed -E 's/version:[[:space:]]*([^+]+)\+.*/\1/' | tr -d ' ')
          BUILD_NUMBER=$(echo "$VERSION_LINE" | sed -E 's/version:.*\+([0-9]+).*/\1/')
          if [ -z "$BUILD_NAME" ]; then BUILD_NAME="1.0.0"; fi
          if [ -z "$BUILD_NUMBER" ]; then BUILD_NUMBER="1"; fi
          echo "build_name=$BUILD_NAME" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Using version: $BUILD_NAME+$BUILD_NUMBER"

      - name: Build APK
        if: matrix.build-type == 'apk'
        run: flutter build apk --release --split-per-abi --build-name=${{ steps.version.outputs.build_name }} --build-number=${{ steps.version.outputs.build_number }}

      - name: Build App Bundle
        if: matrix.build-type == 'appbundle'
        run: flutter build appbundle --release --build-name=${{ steps.version.outputs.build_name }} --build-number=${{ steps.version.outputs.build_number }}

      - name: Upload APK artifacts
        if: matrix.build-type == 'apk'
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk-${{ matrix.build-type }}
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7

      - name: Upload AAB artifact
        if: matrix.build-type == 'appbundle'
        uses: actions/upload-artifact@v4
        with:
          name: flutter-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 7


