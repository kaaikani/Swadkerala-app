plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.unified.ecomapp"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    buildFeatures {
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_11.toString()
    }

    defaultConfig {
        applicationId "com.unified.ecomapp"
        minSdk flutter.minSdkVersion
        targetSdk flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName
        multiDexEnabled true
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            // Use debug keystore for testing (remove this for production)
            signingConfig signingConfigs.debug

            // Disable optimization for better compatibility
            minifyEnabled false
            shrinkResources false
            zipAlignEnabled true
            debuggable false

            ndk {
                debugSymbolLevel "NONE"
            }

            buildConfigField "boolean", "DEBUG", "false"
            manifestPlaceholders = [appName: "Unified EcomApp"]
        }
        debug {
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source "../.."
    target "lib/main.dart"
}

dependencies {
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.0.4"
}
