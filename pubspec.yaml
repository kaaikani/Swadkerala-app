name: recipe.app
description: A new Flutter project.

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
version: 1.0.0+11
environment:
  sdk: ">=2.17.6 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Core dependencies only
  cupertino_icons: ^1.0.8
  graphql_flutter: ^5.1.2
  gql: ^1.0.1
  flutter_dotenv: ^6.0.0
  get: ^4.7.2
  get_storage: ^2.1.1
  connectivity_plus: ^5.0.2
  razorpay_flutter: ^1.3.7
  mobile_number: ^3.0.0
  permission_handler: ^11.3.1
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  sms_autofill: ^2.3.0
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0
  in_app_update: ^4.2.3
  http: ^1.1.0
  flutter_html: ^3.0.0-beta.2
  marquee: ^2.3.0

  skeletonizer: ^2.1.0  # Using 2.1.0 for Flutter 3.35.5+ compatibility
  firebase_core: ^2.30.1
  firebase_messaging: ^14.9.1
  firebase_crashlytics: ^3.5.7
  firebase_analytics: ^10.10.7
  firebase_remote_config: ^4.4.7
  flutter_local_notifications: ^17.2.1
  app_links: ^6.3.3
  share_plus: ^7.2.1
  pdf: ^3.11.3
  printing: ^5.13.1
  path_provider: ^2.1.5
  slide_to_act: ^2.0.2
  flutter_dynamic_icon: ^2.1.0
  flutter_app_badger: ^1.5.0
  google_sign_in: 6.1.6
  sign_in_with_apple: ^6.1.0
  carousel_slider: ^5.0.0
  cached_network_image: ^3.3.1
  speech_to_text: 6.6.0
  font_awesome_flutter: ^10.7.0
  facebook_app_events: ^0.24.0




dev_dependencies:
  flutter_test:
    sdk: flutter
  image: ^4.5.0
  flutter_lints: ^5.0.0
  build_runner: ^2.4.6
  graphql_codegen: ^1.1.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1
  google_sign_in_ios: 5.7.6


flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/fonts/
    - assets/images/onboarding_1.jpeg
    - assets/images/onboarding_2.jpeg
    - assets/images/onboarding_3.jpeg

flutter_launcher_icons:
  android: true
  ios: true
  # Use same logo as splash screen for consistent branding
  image_path: "assets/images/kklogo_padded.png"
  # iOS: use icon with green background (avoids black from remove_alpha)
  image_path_ios: "assets/images/kklogo_icon_ios.png"
  adaptive_icon_background: "#4CB150"
  adaptive_icon_foreground: "assets/images/kklogo_foreground_large.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#4CB150"
  image: "assets/images/kklogo_padded.png"
  fullscreen: true
  android: true
  ios: true
  # Scale splash image to fit screen on iOS so logo appears larger
  ios_content_mode: scaleAspectFit
  image_dark: "assets/images/kklogo_padded.png"
  color_dark: "#4CB150"

  android_12:
    image: "assets/images/kklogo_padded.png"
    image_dark: "assets/images/kklogo_padded.png"
    icon_background_color: "#4CB150"
    icon_background_color_dark: "#4CB150"
